<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaudoProfi</title>
<style>
  :root {
    --bg: #F1EFE8;
    --surface: #FFFFFF;
    --border: #E0DED6;
    --text: #2C2C2A;
    --text-secondary: #6B6A64;
    --text-muted: #999790;
    --accent: #378ADD;
    --accent-bg: #E6F1FB;
    --accent-text: #0C447C;
    --success-bg: #EAF3DE;
    --success-text: #27500A;
    --warning-bg: #FAEEDA;
    --warning-text: #854F0B;
    --danger-bg: #FCEBEB;
    --danger-text: #791F1F;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { font-weight: 700; font-size: 16px; }
  .topbar .brand span { font-family: "IBM Plex Mono", monospace; color: var(--accent); }
  .topbar .user-info { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; }
  .topbar button.link { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; }

  .container { max-width: 920px; margin: 0 auto; padding: 24px; }
  .center-container { max-width: 420px; margin: 60px auto; padding: 0 20px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .card .subtitle { font-size: 13px; color: var(--text-secondary); margin: 0 0 16px; }

  label { font-size: 12px; color: var(--text-secondary); display: block; margin: 10px 0 4px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
  }
  textarea { resize: vertical; }

  button.btn {
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }
  button.btn.primary { background: var(--text); color: #fff; border: none; }
  button.btn.primary:disabled { background: #B8B6AC; cursor: not-allowed; }
  button.btn:hover { opacity: 0.9; }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 160px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-secondary); font-weight: 500; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 12px; }
  td { padding: 10px 6px; border-bottom: 1px solid #EFEDE5; }
  tr:last-child td { border-bottom: none; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; display: inline-block; }
  .pill.rascunho { background: var(--warning-bg); color: var(--warning-text); }
  .pill.em_revisao { background: var(--accent-bg); color: var(--accent-text); }
  .pill.assinado { background: var(--success-bg); color: var(--success-text); }
  .pill.entregue { background: #E8E6DC; color: #57564F; }
  .pill.complementado, .pill.retificado { background: var(--danger-bg); color: var(--danger-text); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tabs button {
    background: none; border: none; padding: 10px 16px; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tabs button.active { color: var(--text); border-bottom-color: var(--text); }

  .error-box { background: var(--danger-bg); color: var(--danger-text); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin: 10px 0; }
  .info-box { background: var(--accent-bg); color: var(--accent-text); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin: 10px 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

  .plan-banner {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 20px; margin-bottom: 16px; font-size: 13px;
  }
  .compare-box { background: var(--bg); border-radius: var(--radius); padding: 14px; margin-top: 10px; }
  .compare-box .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px; }
  .compare-box .text { font-size: 13px; line-height: 1.6; }

  code.mono { font-family: "IBM Plex Mono", monospace; font-size: 12px; }
  .hidden { display: none !important; }

  /* -------------------- WIDGET DE AJUDA -------------------- */
  .help-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--text); color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
  .help-fab:hover { background: var(--accent); }
  .help-overlay {
    position: fixed; inset: 0; background: rgba(44,44,42,0.4); z-index: 60;
    display: flex; align-items: flex-end; justify-content: flex-end; padding: 24px;
  }
  .help-panel {
    background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
    width: 360px; max-width: calc(100vw - 48px); max-height: 80vh; overflow-y: auto;
    padding: 20px; box-shadow: 0 12px 32px rgba(0,0,0,0.18);
  }
  .help-panel h3 { margin: 0 0 4px; font-size: 15px; }
  .help-panel .subtitle { margin: 0 0 14px; }
  .help-context-chip {
    display: inline-block; background: var(--accent-bg); color: var(--accent-text);
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
  }
  .help-ticket-item { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 12px; }
  .help-ticket-item:last-child { border-bottom: none; }
  .help-ticket-status { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
  .help-ticket-status.aberto { background: var(--warning-bg); color: var(--warning-text); }
  .help-ticket-status.respondido { background: var(--success-bg); color: var(--success-text); }
  .help-ticket-status.fechado { background: #E8E6DC; color: #57564F; }
  .help-reply-box { background: var(--bg); border-radius: 8px; padding: 8px 10px; margin-top: 6px; font-size: 12px; }
</style>
</head>
<body>

<div id="app"></div>
<div id="help-widget"></div>

<script>
// =====================================================================
// Configuração — troque pela URL real do seu backend em produção
// =====================================================================
const API_BASE = "https://laudo-backend.onrender.com";

// =====================================================================
// Estado global simples (sem framework — app pequena o suficiente
// para não precisar de React/Vue aqui)
// =====================================================================
const state = {
  token: localStorage.getItem("laudo_token") || null,
  engineer: JSON.parse(localStorage.getItem("laudo_engineer") || "null"),
  view: "loading",
  clients: [],
  projects: [],
  templates: [],
  reports: [],
  activeReport: null,
  error: null,
  reportFilterStatus: "all",
  reportSearch: "",
  intendedPlan: new URLSearchParams(window.location.search).get("plan"),
  publicPlans: [],
  publicPlansError: null,
  helpOpen: false,
  helpTab: "new", // "new" | "history"
  helpTickets: [],
  helpSubmitting: false,
  pendingPhotoLocation: null,
  reportSections: [],
};

function setToken(token, engineer) {
  state.token = token;
  state.engineer = engineer;
  if (token) {
    localStorage.setItem("laudo_token", token);
    localStorage.setItem("laudo_engineer", JSON.stringify(engineer));
  } else {
    localStorage.removeItem("laudo_token");
    localStorage.removeItem("laudo_engineer");
  }
}

// =====================================================================
// Helper de chamadas à API
// =====================================================================
async function api(path, options = {}) {
  const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
  if (state.token) headers["Authorization"] = `Bearer ${state.token}`;

  const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    const err = new Error(data.error || "Erro na requisição");
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

// =====================================================================
// Navegação
// =====================================================================
function goTo(view) {
  state.view = view;
  state.error = null;
  render();
  if (view === "upgrade") {
    loadPublicPlans().then(render);
  }
}

// =====================================================================
// Autenticação
// =====================================================================
async function handleRegister(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const data = await api("/auth/register", {
      method: "POST",
      body: JSON.stringify({
        name: f.signup_name.value,
        email: f.signup_email.value,
        password: f.signup_password.value,
        crea_number: f.crea_number.value,
        crea_region: f.crea_region.value,
        company_name: f.company_name.value,
      }),
    });
    setToken(data.token, data.engineer);
    await redirectAfterAuth();
  } catch (err) {
    state.error = err.message;
    render();
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const data = await api("/auth/login", {
      method: "POST",
      body: JSON.stringify({ email: f.email.value, password: f.password.value }),
    });
    setToken(data.token, data.engineer);
    await redirectAfterAuth();
  } catch (err) {
    state.error = err.message;
    render();
  }
}

function logout() {
  setToken(null, null);
  // Reload completo (não SPA) de propósito: garante que nenhum dado
  // da sessão anterior (laudos, clientes, laudo ativo) sobrevive em
  // memória para a próxima pessoa que logar/cadastrar neste navegador.
  window.location.href = window.location.pathname;
}

function formatCurrencyBRL(cents) {
  return (cents / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

// Redireciona pro checkout do Stripe do plano informado. Usado tanto
// pela tela de upgrade quanto pelo fluxo de "vim da landing page já
// escolhendo um plano pago" logo após cadastro/login.
async function handleCheckout(planCode) {
  try {
    const result = await api("/billing/checkout", {
      method: "POST",
      body: JSON.stringify({ plan_code: planCode }),
    });
    window.location.href = result.checkout_url;
  } catch (err) {
    state.error = err.message;
    goTo("upgrade");
  }
}

// Depois de logar/cadastrar: se a pessoa veio da landing page já
// tendo escolhido um plano pago (?plan=start/pro/escritorio na URL),
// manda direto pro checkout em vez de cair no dashboard. Plano
// "gratis" ou ausência de parâmetro segue o fluxo normal.
async function redirectAfterAuth() {
  const plan = state.intendedPlan;
  state.intendedPlan = null; // consome uma vez só, não repete em navegações futuras
  if (plan && plan !== "gratis") {
    await handleCheckout(plan);
  } else {
    await loadDashboardData();
    goTo("dashboard");
  }
}

// =====================================================================
// Carregamento de dados
// =====================================================================
async function loadDashboardData() {
  try {
    const [clients, projects, templates, reports] = await Promise.all([
      api("/clients"),
      api("/projects"),
      api("/templates"),
      api("/reports"),
    ]);
    state.clients = clients;
    state.projects = projects;
    state.templates = templates;
    state.reports = reports;
  } catch (err) {
    state.error = err.message;
  }
}

// =====================================================================
// Ações — clientes e projetos
// =====================================================================
async function handleCreateClient(e) {
  e.preventDefault();
  const f = e.target;
  try {
    await api("/clients", {
      method: "POST",
      body: JSON.stringify({ name: f.name.value, document: f.document.value, phone: f.phone.value, email: f.email.value }),
    });
    await loadDashboardData();
    goTo("dashboard");
  } catch (err) {
    state.error = err.message;
    render();
  }
}

async function handleCreateProject(e) {
  e.preventDefault();
  const f = e.target;
  try {
    await api("/projects", {
      method: "POST",
      body: JSON.stringify({ client_id: f.client_id.value, address: f.address.value, project_type: f.project_type.value, building_name: f.building_name.value }),
    });
    await loadDashboardData();
    goTo("dashboard");
  } catch (err) {
    state.error = err.message;
    render();
  }
}

// =====================================================================
// Ações — laudos
// =====================================================================
async function handleCreateReport(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const report = await api("/reports", {
      method: "POST",
      body: JSON.stringify({
        project_id: f.project_id.value,
        template_id: f.template_id.value,
        title: f.title.value,
        art_number: f.art_number.value,
      }),
    });
    state.activeReport = report;
    state.reportSections = [];
    state.reportPhotos = [];
    goTo("report_choose_source");
  } catch (err) {
    if (err.status === 402) {
      state.error = null;
      goTo("upgrade");
    } else {
      state.error = err.message;
      render();
    }
  }
}

async function handleGenerate(e) {
  e.preventDefault();
  const f = e.target;
  const btn = f.querySelector("button[type=submit]");
  btn.disabled = true;
  btn.textContent = "Gerando...";
  try {
    const result = await api(`/reports/${state.activeReport.id}/generate`, {
      method: "POST",
      body: JSON.stringify({
        observation: f.observation.value,
      }),
    });
    state.activeReport = result.report;
    state.lastAiResult = result.ai;
    goTo("report_review");
  } catch (err) {
    state.error = err.message;
    render();
  } finally {
    btn.disabled = false;
    btn.textContent = "Gerar com IA";
  }
}

// ---------------------------------------------------------------
// Índice do laudo — o engenheiro digita um título de seção, escolhe o
// nível (seção principal ou subseção) e clica em Incluir: o marcador é
// inserido no ponto do cursor dentro do textarea de observação, com a
// numeração calculada automaticamente a partir do que já existe no
// texto — no mesmo padrão do laudo modelo ("7) Título" para seções,
// "7.1 Título" para subseções). Não é uma tabela separada: o marcador
// vira parte do próprio texto que a IA processa, e o structureReportSections
// já sabe respeitar cabeçalhos numerados existentes em vez de renumerar.
// ---------------------------------------------------------------
const INDEX_SECTION_LINE = /^(\d+)\)\s+.+$/;
const INDEX_SUBSECTION_LINE = /^(\d+)\.(\d+)\s+.+$/;

function computeNextIndexNumbers(text) {
  const lines = text.split("\n");
  let lastSection = 0;
  let lastSubForLastSection = 0;

  for (const line of lines) {
    const sectionMatch = line.match(INDEX_SECTION_LINE);
    if (sectionMatch) {
      lastSection = parseInt(sectionMatch[1], 10);
      lastSubForLastSection = 0;
      continue;
    }
    const subMatch = line.match(INDEX_SUBSECTION_LINE);
    if (subMatch && parseInt(subMatch[1], 10) === lastSection) {
      lastSubForLastSection = Math.max(lastSubForLastSection, parseInt(subMatch[2], 10));
    }
  }

  return {
    nextSection: lastSection + 1,
    nextSubsection: `${lastSection || 1}.${lastSubForLastSection + 1}`,
    hasSection: lastSection > 0,
  };
}

function handleInsertIndexItem() {
  const textarea = document.getElementById("observationTextarea");
  const titleInput = document.getElementById("indexItemTitle");
  const level = document.getElementById("indexItemLevel").value;
  const title = titleInput.value.trim();

  if (!title) {
    titleInput.focus();
    return;
  }

  const cursorPos = textarea.selectionStart ?? textarea.value.length;
  const before = textarea.value.slice(0, cursorPos);
  const after = textarea.value.slice(cursorPos);

  const { nextSection, nextSubsection, hasSection } = computeNextIndexNumbers(before);

  if (level === "subsection" && !hasSection) {
    // Não usa render() aqui de propósito: isso substituiria o HTML inteiro
    // da tela e descartaria o que já foi digitado no textarea (o conteúdo
    // dele só existe no DOM, não é sincronizado com o state a cada tecla).
    alert("Inclua uma seção principal antes de adicionar uma subseção.");
    return;
  }

  const heading = level === "section" ? `${nextSection}) ${title}` : `${nextSubsection} ${title}`;

  // Garante linhas em branco separando o novo cabeçalho do texto ao redor,
  // sem duplicar quebras de linha se já existirem
  const needsLeadingBreak = before.length > 0 && !before.endsWith("\n\n");
  const leading = before.length === 0 ? "" : (needsLeadingBreak ? (before.endsWith("\n") ? "\n" : "\n\n") : "");
  const insertion = `${leading}${heading}\n`;

  textarea.value = before + insertion + after;
  const newCursorPos = (before + insertion).length;
  textarea.focus();
  textarea.setSelectionRange(newCursorPos, newCursorPos);

  titleInput.value = "";
  updateIndexPreview();
}

function extractIndexHeadings(text) {
  return text.split("\n")
    .map((line) => line.trim())
    .filter((line) => INDEX_SECTION_LINE.test(line) || INDEX_SUBSECTION_LINE.test(line));
}

function updateIndexPreview() {
  const textarea = document.getElementById("observationTextarea");
  const preview = document.getElementById("indexPreview");
  if (!textarea || !preview) return;

  const headings = extractIndexHeadings(textarea.value);
  if (headings.length === 0) {
    preview.innerHTML = `<p style="font-size:11px; color:var(--text-muted); margin:0;">Nenhum item de índice ainda — inclua o primeiro acima.</p>`;
    return;
  }

  preview.innerHTML = `
    <p style="font-size:11px; font-weight:600; color:var(--text-muted); margin:0 0 4px;">Índice atual:</p>
    <div style="border:1px solid var(--border); border-radius:8px; padding:8px 10px; background:#fff;">
      ${headings.map((h) => {
        const isSub = INDEX_SUBSECTION_LINE.test(h);
        return `<div style="font-size:12px; padding:3px 0; padding-left:${isSub ? "16px" : "0"}; font-weight:${isSub ? "400" : "600"};">${h}</div>`;
      }).join("")}
    </div>
  `;
}

async function handleImportDocument(e) {
  e.preventDefault();
  const f = e.target;
  const fileInput = f.file;
  if (!fileInput.files.length) {
    state.error = "Selecione um arquivo .docx ou .pdf.";
    render();
    return;
  }

  const btn = f.querySelector("button[type=submit]");
  btn.disabled = true;
  btn.textContent = "Revisando...";

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  try {
    const res = await fetch(`${API_BASE}/reports/${state.activeReport.id}/import`, {
      method: "POST",
      headers: { Authorization: `Bearer ${state.token}` },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Erro ao importar documento.");

    state.activeReport = data.report;
    state.lastReview = data.review;
    goTo("report_import_review");
  } catch (err) {
    state.error = err.message;
    render();
  } finally {
    btn.disabled = false;
    btn.textContent = "Enviar e revisar";
  }
}

async function handleImportReview(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const updated = await api(`/reports/${state.activeReport.id}/review`, {
      method: "PATCH",
      body: JSON.stringify({ edited_text: f.edited_text.value }),
    });
    state.activeReport = updated;
    await loadDashboardData();
    await loadReportPhotos(updated.id);
    goTo("report_done");
  } catch (err) {
    state.error = err.message;
    render();
  }
}


async function handleReview(e) {
  e.preventDefault();
  const f = e.target;
  try {
    const updated = await api(`/reports/${state.activeReport.id}/review`, {
      method: "PATCH",
      body: JSON.stringify({ edited_text: f.edited_text.value, edited_opinion: f.edited_opinion.value }),
    });
    state.activeReport = updated;
    await loadDashboardData();
    await loadReportPhotos(updated.id);
    goTo("report_done");
  } catch (err) {
    state.error = err.message;
    render();
  }
}

async function loadReportPhotos(reportId) {
  try {
    state.reportPhotos = await api(`/reports/${reportId}/photos`);
  } catch (err) {
    state.reportPhotos = [];
  }
}

// Chamado quando o engenheiro escolhe/tira a(s) foto(s). Pede a
// localização do dispositivo NA HORA — não espera até o clique de
// "Enviar fotos" — porque é o momento mais próximo de quando a foto
// foi de fato tirada (câmera do celular via capture="environment").
// Atualiza só o texto de status via DOM direto (não chama render(),
// que recriaria o <input type=file> e perderia os arquivos escolhidos).
function handlePhotoFilesSelected() {
  const input = document.getElementById("photoFileInput");
  const statusEl = document.getElementById("photoLocationStatus");
  if (!input || !input.files.length) return;

  state.pendingPhotoLocation = null;
  if (statusEl) statusEl.textContent = "📍 Capturando localização...";

  if (!navigator.geolocation) {
    if (statusEl) statusEl.textContent = "Localização não suportada neste navegador — foto será enviada sem coordenada.";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.pendingPhotoLocation = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        captured_at: new Date().toISOString(),
      };
      if (statusEl) {
        statusEl.textContent = `📍 Localização capturada (precisão de ~${Math.round(pos.coords.accuracy)}m)`;
      }
    },
    (err) => {
      if (statusEl) {
        statusEl.textContent = "Não foi possível capturar a localização (permissão negada ou indisponível) — foto será enviada sem coordenada.";
      }
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function handleUploadPhotos(e) {
  e.preventDefault();
  const f = e.target;
  const fileInput = f.photos;
  if (!fileInput.files.length) {
    state.error = "Selecione ao menos uma foto.";
    render();
    return;
  }

  const btn = f.querySelector("button[type=submit]");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  const formData = new FormData();
  const loc = state.pendingPhotoLocation;
  Array.from(fileInput.files).forEach((file) => {
    formData.append("photos", file);
    // Mesma coordenada aplicada a todas as fotos deste envio — elas
    // foram tiradas na mesma hora/local, no mesmo lote de seleção.
    formData.append("latitudes", loc ? loc.latitude : "");
    formData.append("longitudes", loc ? loc.longitude : "");
    formData.append("accuracies", loc ? loc.accuracy : "");
    formData.append("captured_ats", loc ? loc.captured_at : "");
  });

  try {
    const res = await fetch(`${API_BASE}/reports/${state.activeReport.id}/photos`, {
      method: "POST",
      headers: { Authorization: `Bearer ${state.token}` },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Erro ao enviar fotos.");

    state.pendingPhotoLocation = null;
    await loadReportPhotos(state.activeReport.id);
    render();
  } catch (err) {
    state.error = err.message;
    render();
  } finally {
    btn.disabled = false;
    btn.textContent = "Enviar fotos";
  }
}

async function handleDeletePhoto(photoId) {
  try {
    await api(`/reports/${state.activeReport.id}/photos/${photoId}`, { method: "DELETE" });
    await loadReportPhotos(state.activeReport.id);

async function openPdf(reportId) {
  try {
    const res = await fetch(`${API_BASE}/reports/${reportId}/pdf`, {
      headers: { Authorization: `Bearer ${state.token}` },
    });
    if (!res.ok) throw new Error("Não foi possível carregar o PDF.");
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
  } catch (err) {
    alert(err.message);
  }
}

// =====================================================================
// Render — cada view é uma função que devolve uma string HTML
// =====================================================================
function render() {
  const app = document.getElementById("app");
  if (!state.token) {
    app.innerHTML = state.view === "register" ? viewRegister() : viewLogin();
    bindAuthForms();
    document.getElementById("help-widget").innerHTML = "";
    return;
  }

  let content;
  switch (state.view) {
    case "new_client": content = viewNewClient(); break;
    case "new_project": content = viewNewProject(); break;
    case "new_report": content = viewNewReport(); break;
    case "report_choose_source": content = viewReportChooseSource(); break;
    case "report_import": content = viewReportImport(); break;
    case "report_import_review": content = viewReportImportReview(); break;
    case "report_generate": content = viewReportGenerate(); break;
    case "report_review": content = viewReportReview(); break;
    case "report_done": content = viewReportDone(); break;
    case "upgrade": content = viewUpgrade(); break;
    default: content = viewDashboard();
  }

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">Laudo<span>Profi</span></div>
      <div class="user-info">
        ${state.engineer ? `${state.engineer.name} · plano ${state.engineer.plan}` : ""}
        <button class="link" onclick="logout()">Sair</button>
      </div>
    </div>
    <div class="container">${content}</div>
  `;
  bindAppForms();
  renderHelpWidget();
  if (state.view === "report_generate") updateIndexPreview();
}

const STATUS_LABELS = {

function getFilteredReports() {
  return state.reports.filter((r) => {
    const matchesStatus = state.reportFilterStatus === "all" || r.status === state.reportFilterStatus;
    const matchesSearch = !state.reportSearch || r.title.toLowerCase().includes(state.reportSearch.toLowerCase());
    return matchesStatus && matchesSearch;

  if (!confirm("Destravar este laudo para revisão? A versão assinada atual fica preservada no histórico — ao assinar de novo, você vai precisar descrever o que mudou.")) return;
  try {

function reportRowActions(r) {
  const actions = [];
  if (r.generated_content_json) {
    actions.push(`<button class="btn" onclick="openPdf('${r.id}')">Ver PDF</button>`);
  }
  if (r.status === "em_revisao") {
    actions.push(`<button class="btn primary" onclick="handleSignReport('${r.id}')">Assinar</button>`);
  }
  if (r.status === "assinado") {
    actions.push(`<button class="btn" onclick="handleDeliverReport('${r.id}')">Marcar entregue</button>`);
    actions.push(`<button class="btn" onclick="handleUnlockReport('${r.id}')">Destravar p/ revisão</button>`);
  }
  if (r.status === "entregue") {
    actions.push(`<button class="btn" onclick="handleUnlockReport('${r.id}')">Destravar p/ revisão</button>`);
  }
  actions.push(`<button class="btn" onclick="handleDuplicateReport('${r.id}')" title="Cria um novo laudo em rascunho com as mesmas seções">Duplicar</button>`);
  return actions.join(" ");
}

      <h2>Revisar texto do laudo</h2>
      ${errorHtml()}
      ${ai && ai.insufficientDetail ? `<div class="error-box">⚠ A observação original foi muito vaga. O texto abaixo permaneceu igualmente genérico de propósito — a IA não deve preencher lacunas com suposições. Considere voltar e descrever a observação com mais detalhe antes de confirmar.</div>` : ""}
      ${ai && ai.citedNormCode ? `<div class="info-box">Norma citada: ${ai.citedNormCode}</div>` : ""}
      <form id="reviewForm">
        <label>Vistoria e diagnóstico (editável antes de confirmar)</label>
        <textarea name="edited_text" rows="6" required>${state.activeReport.generated_content_json.text}</textarea>
        <label>Parecer técnico conclusivo (editável antes de confirmar)</label>
        <textarea name="edited_opinion" rows="4" required>${state.activeReport.technical_opinion_json?.text || ai?.technicalOpinion || ""}</textarea>
        <div style="margin-top:16px; display:flex; gap:8px;">
          <button type="button" class="btn" onclick="goTo('report_generate')">Gerar novamente</button>
          <button class="btn primary" type="submit">Confirmar revisão</button>
        </div>
      </form>
    </div>
  `;
}

function viewReportDone() {
  const photos = state.reportPhotos || [];
  const sections = state.reportSections || [];
  return `
    <div class="card">
      <h2>Laudo revisado ✓</h2>
      <p class="subtitle">Confira a pré-visualização exata do PDF antes de assinar. Depois de assinado, o conteúdo fica travado.</p>
      <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
        <button class="btn primary" onclick="openPdf('${state.activeReport.id}')">📄 Visualizar impressão (PDF)</button>
        <button class="btn" onclick="handleStructureSections(this)">Organizar em seções automaticamente</button>
        <button class="btn primary" onclick="handleSignReport('${state.activeReport.id}')">Assinar laudo</button>
        <button class="btn" onclick="goTo('dashboard')">Voltar ao painel</button>
      </div>
      ${sections.length > 0 ? `
        <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
          <p style="font-size:12px; font-weight:600; margin:0 0 6px;">Seções organizadas (${sections.length}):</p>
          <p style="font-size:12px; color:var(--text-muted); margin:0;">
            ${sections.map((s) => `${s.section_number}) ${s.section_title}`).join(" · ")}
          </p>
        </div>
      ` : ""}
      <p style="font-size:12px; color:var(--text-muted); margin-top:16px;">
        Assinatura digital hoje: assine no sistema (botão acima) e, se quiser validade jurídica de assinatura digital oficial, baixe o PDF e assine com sua conta gov.br em
        <a href="https://assinador.iti.br" target="_blank">assinador.iti.br</a> (gratuito, ICP-Brasil).
      </p>
    </div>

    <div class="card">
      <h2>Fotos do laudo</h2>
      <p class="subtitle">As fotos anexadas aparecem no PDF final, na seção "Registro Fotográfico"</p>
      ${errorHtml()}
      <form id="photoUploadForm">
        <label>Adicionar foto (.jpg, .png — até 2MB cada)</label>
        <input type="file" name="photos" id="photoFileInput" accept="image/*" capture="environment" multiple onchange="handlePhotoFilesSelected()">
        <p id="photoLocationStatus" style="font-size:12px; color:var(--text-muted); margin:6px 0 0;"></p>
        <div style="margin-top:12px;"><button class="btn" type="submit">Enviar fotos</button></div>
      </form>
      ${photos.length > 0 ? `
        <div class="row" style="margin-top:16px; flex-wrap:wrap;">
          ${photos.map((p) => `
            <div style="max-width:140px;">
              <img src="${API_BASE}/reports/${state.activeReport.id}/photos/${p.id}?token=${state.token}" style="width:100%; border-radius:8px; border:1px solid var(--border);">
              <p style="font-size:11px; color:var(--text-muted); margin:4px 0;">${p.caption || ""}</p>
              ${p.latitude != null && p.longitude != null ? `
                <a href="https://www.google.com/maps?q=${p.latitude},${p.longitude}" target="_blank" style="font-size:11px; display:block; margin-bottom:4px;">📍 ver no mapa</a>
              ` : ""}
              <button class="btn" style="font-size:11px; padding:4px 8px;" onclick="handleDeletePhoto('${p.id}')">Remover</button>
            </div>
          `).join("")}
        </div>
      ` : `<p class="empty-state">Nenhuma foto anexada ainda.</p>`}
    </div>
  `;
}

// ---------------------------------------------------------------
// View: upgrade / limite atingido
// ---------------------------------------------------------------
async function loadPublicPlans() {
  if (state.publicPlans.length > 0) return;
  state.publicPlansError = null;
  try {
    state.publicPlans = await api("/public/plans");
  } catch (err) {
    console.error(err);
    state.publicPlansError = "Não foi possível carregar os planos agora. Tente recarregar a página.";
  }
}

function viewUpgrade() {
  const paidPlans = state.publicPlans.filter((p) => p.billing_period === "mensal");
  const cards = paidPlans.length
    ? paidPlans.map((p) => `
        <div class="card" style="${p.plan_code === 'pro' ? 'border:2px solid var(--accent);' : ''} text-align:left;">
          ${p.plan_code === "pro" ? `<span class="pill" style="background:var(--accent-bg); color:var(--accent-text);">Mais popular</span>` : ""}
          <p style="font-size:15px; font-weight:600; margin:8px 0 2px;">${p.display_name} — ${formatCurrencyBRL(p.price_cents)}/mês</p>
          <p class="subtitle" style="margin-bottom:12px;">Até ${p.laudos_included} laudos por mês</p>
          <button class="btn primary" style="width:100%;" onclick="handleCheckout('${p.plan_code}')">Assinar ${p.display_name}</button>
        </div>`).join("")
    : state.publicPlansError
      ? `<div class="card" style="text-align:center;">
          <p class="subtitle" style="color:var(--danger-text, #791F1F);">${state.publicPlansError}</p>
          <button class="btn" onclick="loadPublicPlans().then(render)">Tentar de novo</button>
        </div>`
      : `<p class="subtitle">Carregando planos...</p>`;

  return `
    <button class="btn" onclick="goTo('dashboard')">← Voltar</button>
    <div style="margin-top:12px; max-width:420px; margin-left:auto; margin-right:auto;">
      <div class="card" style="text-align:center;">
        <h2>Escolha um plano</h2>
        <p class="subtitle">Você atingiu o limite de laudos do plano grátis, ou quer mais capacidade</p>
      </div>
      ${cards}
    </div>
  `;
}

// ---------------------------------------------------------------
// Bind de formulários da área logada
// ---------------------------------------------------------------
function bindAppForms() {
  const map = {
    newClientForm: handleCreateClient,
    newProjectForm: handleCreateProject,
    newReportForm: handleCreateReport,
    generateForm: handleGenerate,
    reviewForm: handleReview,
    importForm: handleImportDocument,
    importReviewForm: handleImportReview,
    photoUploadForm: handleUploadPhotos,
  };
  Object.entries(map).forEach(([id, handler]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("submit", handler);
  });
}

// =====================================================================
// Widget de ajuda — botão flutuante presente em qualquer tela logada.
// A ideia central: quando o engenheiro clica em "Ajuda", o sistema já
// sabe em qual laudo e em qual etapa do fluxo ele está, e manda isso
// junto do chamado — sem precisar perguntar "em qual laudo você
// estava?" depois.
// =====================================================================
const VIEW_LABELS = {
  dashboard: "Painel principal",
  new_client: "Cadastro de cliente",
  new_project: "Cadastro de projeto",
  new_report: "Criação de laudo",
  report_choose_source: "Escolha de origem do laudo",
  report_import: "Importação de documento",
  report_import_review: "Revisão de documento importado",
  report_generate: "Geração de texto por IA",
  report_review: "Revisão do laudo",
  report_done: "Laudo finalizado",
  upgrade: "Escolha de plano",
};

function currentHelpContext() {
  return {
    page_context: state.view,
    page_label: VIEW_LABELS[state.view] || state.view,
    report_id: state.activeReport ? state.activeReport.id : null,
    report_title: state.activeReport ? state.activeReport.title : null,
  };
}

function toggleHelp() {
  state.helpOpen = !state.helpOpen;
  if (state.helpOpen) state.helpTab = "new";
  renderHelpWidget();
}

async function switchHelpTab(tab) {
  state.helpTab = tab;
  if (tab === "history") await loadHelpTickets();
  renderHelpWidget();
}

async function loadHelpTickets() {
  try {
    state.helpTickets = await api("/support/tickets");
  } catch (err) {
    console.error(err);
  }
}

async function handleSubmitTicket(e) {
  e.preventDefault();
  const f = e.target;
  const btn = f.querySelector("button[type=submit]");
  state.helpSubmitting = true;
  btn.disabled = true;
  btn.textContent = "Enviando...";
  try {
    const ctx = currentHelpContext();
    await api("/support/tickets", {
      method: "POST",
      body: JSON.stringify({
        subject: f.subject.value,
        message: f.message.value,
        report_id: ctx.report_id,
        page_context: ctx.page_context,
      }),
    });
    state.helpSubmitting = false;
    await switchHelpTab("history");
  } catch (err) {
    state.helpSubmitting = false;
    alert("Não foi possível enviar: " + err.message);
    renderHelpWidget();
  }
}

function helpTicketsHtml() {
  if (state.helpTickets.length === 0) {
    return `<p class="subtitle">Nenhum chamado ainda.</p>`;
  }
  return state.helpTickets.map((t) => `
    <div class="help-ticket-item">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <strong>${t.subject}</strong>
        <span class="help-ticket-status ${t.status}">${t.status}</span>
      </div>
      <p style="margin:4px 0; color:var(--text-secondary);">${t.message}</p>
      ${t.report_title ? `<p style="margin:0; color:var(--text-muted); font-size:11px;">Laudo: ${t.report_title}</p>` : ""}
      ${t.admin_reply ? `<div class="help-reply-box"><strong>Resposta:</strong> ${t.admin_reply}</div>` : ""}
    </div>
  `).join("");
}

function renderHelpWidget() {
  const holder = document.getElementById("help-widget");
  if (!state.token) { holder.innerHTML = ""; return; }

  if (!state.helpOpen) {
    holder.innerHTML = `<button class="help-fab" onclick="toggleHelp()" title="Precisa de ajuda?">?</button>`;
    return;
  }

  const ctx = currentHelpContext();

  const newTabHtml = `
    <div class="help-context-chip">Contexto: ${ctx.page_label}${ctx.report_title ? " · " + ctx.report_title : ""}</div>
    <form id="ticketForm">
      <label>Assunto</label>
      <input name="subject" required placeholder="Resuma sua dúvida em poucas palavras">
      <label>Descreva sua dúvida</label>
      <textarea name="message" rows="4" required placeholder="Conte o que aconteceu ou o que precisa"></textarea>
      <div style="margin-top:12px;">
        <button class="btn primary" type="submit" style="width:100%;">Enviar</button>
      </div>
    </form>
  `;

  const historyTabHtml = helpTicketsHtml();

  holder.innerHTML = `
    <div class="help-overlay" onclick="if(event.target === this) toggleHelp()">
      <div class="help-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3>Central de ajuda</h3>
          <button class="btn" style="padding:4px 10px;" onclick="toggleHelp()">Fechar</button>
        </div>
        <p class="subtitle">Alguma dúvida sobre esse laudo ou o app? Fale com a gente.</p>
        <div class="tabs">
          <button class="${state.helpTab === 'new' ? 'active' : ''}" onclick="switchHelpTab('new')">Nova pergunta</button>
          <button class="${state.helpTab === 'history' ? 'active' : ''}" onclick="switchHelpTab('history')">Meus chamados</button>
        </div>
        ${state.helpTab === "new" ? newTabHtml : historyTabHtml}
      </div>
    </div>
  `;

  const ticketForm = document.getElementById("ticketForm");
  if (ticketForm) ticketForm.addEventListener("submit", handleSubmitTicket);
}

// =====================================================================
// Boot
// =====================================================================
async function boot() {
  if (state.token) {
    await loadDashboardData();
    state.view = "dashboard";
  } else {
    // Quem chega com ?plan=... veio da landing page escolhendo um
    // plano — manda direto pro cadastro, não pro login.
    state.view = state.intendedPlan ? "register" : "login";
  }
  render();
}

boot();
</script>
